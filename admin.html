<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>BookHoard — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #C4561A;
      --cream:  #FDFAF3;
      --dark:   #1C1410;
      --muted:  #4A3728;
      --card:   #FFF8EC;
      --border: #E8DFC8;
      --green:  #2F7D32;
      --red:    #B23A3A;
      --amber:  #B97A1A;
      --font:   system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --mono:   ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    html { font-size: 15px; }
    body {
      font-family: var(--font);
      background: var(--cream);
      color: var(--dark);
      line-height: 1.5;
      min-height: 100vh;
    }
    a { color: var(--orange); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    header h1 {
      font-size: 1.05rem;
      color: var(--orange);
      font-weight: 700;
    }
    .who { font-size: 0.85rem; color: var(--muted); display: flex; gap: 1rem; align-items: center; }
    .who button {
      background: transparent;
      border: 1px solid var(--border);
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      font: inherit;
      color: var(--muted);
      cursor: pointer;
    }
    .who button:hover { background: var(--border); }

    main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

    /* ── LOGIN ── */
    .login-wrap {
      max-width: 380px;
      margin: 6rem auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2rem;
    }
    .login-wrap h2 { margin-bottom: 1rem; font-size: 1.2rem; }
    .login-wrap p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .login-wrap label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.25rem; margin-top: 0.75rem; }
    .login-wrap input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font: inherit;
      background: white;
    }
    .login-wrap input:focus { outline: 2px solid var(--orange); outline-offset: 1px; }
    .login-wrap button {
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.7rem;
      background: var(--orange);
      color: white;
      border: none;
      border-radius: 6px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .login-wrap button:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error { color: var(--red); font-size: 0.85rem; margin-top: 0.75rem; min-height: 1.2em; }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 0.25rem;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .tabs button {
      background: transparent;
      border: none;
      padding: 0.7rem 1rem;
      font: inherit;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tabs button:hover { color: var(--dark); }
    .tabs button.active {
      color: var(--orange);
      border-bottom-color: var(--orange);
      font-weight: 600;
    }

    /* ── PANELS ── */
    .panel { display: none; }
    .panel.active { display: block; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .card h3 {
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
    }
    .stat .label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .stat .value { font-size: 1.4rem; font-weight: 700; margin-top: 0.15rem; }
    .stat .sub { font-size: 0.75rem; color: var(--muted); }

    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th, td {
      text-align: left;
      padding: 0.5rem 0.6rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th { font-weight: 600; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; }
    tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-success { background: #E0F0E2; color: var(--green); }
    .badge-fail    { background: #F5DEDE; color: var(--red); }
    .badge-pending { background: #FBEBD0; color: var(--amber); }
    .badge-muted   { background: var(--border); color: var(--muted); }

    .empty { color: var(--muted); font-size: 0.9rem; padding: 0.75rem 0; }
    .loading { color: var(--muted); font-size: 0.9rem; padding: 1rem 0; }
    .err { color: var(--red); font-size: 0.85rem; padding: 0.75rem 0; }
    .mono { font-family: var(--mono); font-size: 0.82rem; }

    .search-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .search-row input {
      flex: 1;
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font: inherit;
      background: white;
    }
    .search-row button {
      padding: 0.55rem 1rem;
      background: var(--orange);
      color: white;
      border: none;
      border-radius: 6px;
      font: inherit;
      cursor: pointer;
    }

    .row-actions { display: flex; flex-wrap: wrap; gap: 0.35rem; align-items: center; }
    .grant-pair { display: inline-flex; gap: 0.35rem; align-items: center; }
    .row-btn {
      background: white;
      border: 1px solid var(--border);
      padding: 0.3rem 0.6rem;
      border-radius: 5px;
      font: inherit;
      font-size: 0.78rem;
      color: var(--dark);
      cursor: pointer;
    }
    .row-btn:hover:not(:disabled) { background: var(--border); }
    .row-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .row-select {
      padding: 0.3rem 0.4rem;
      border: 1px solid var(--border);
      border-radius: 5px;
      font: inherit;
      font-size: 0.78rem;
      background: white;
    }
    .row-status { font-size: 0.75rem; color: var(--muted); width: 100%; }
    .row-status.ok  { color: var(--green); }
    .row-status.err { color: var(--red); }
  </style>
</head>
<body>

<div id="app"></div>

<!-- Supabase JS via CDN (public anon key, safe to embed) -->
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const SUPABASE_URL = 'https://piahhiaadhdprbslddky.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpYWhoaWFhZGhkcHJic2xkZGt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM3MDEsImV4cCI6MjA4OTUzOTcwMX0.vHvTQmMV9uwtXR7kWJeSNG8ZjpoAnK0Dq0WKd7Y56uA';
  const BACKEND_URL = 'https://hoard-dev-production.up.railway.app';

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const app = document.getElementById('app');

  // ── helpers ────────────────────────────────────────────────────────────────
  const h = (tag, attrs = {}, ...children) => {
    const el = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'class') el.className = v;
      else if (k === 'html') el.innerHTML = v;
      else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
      else el.setAttribute(k, v);
    }
    for (const c of children.flat()) {
      if (c == null || c === false) continue;
      el.append(c instanceof Node ? c : document.createTextNode(String(c)));
    }
    return el;
  };

  const fmtBytes = (n) => {
    if (n == null) return '—';
    if (n < 1024) return `${n} B`;
    if (n < 1024 ** 2) return `${(n / 1024).toFixed(1)} KB`;
    if (n < 1024 ** 3) return `${(n / 1024 ** 2).toFixed(1)} MB`;
    return `${(n / 1024 ** 3).toFixed(2)} GB`;
  };
  const fmtNum = (n) => n == null ? '—' : Number(n).toLocaleString();
  const fmtPct = (n) => n == null ? '—' : `${(n * 100).toFixed(1)}%`;
  const fmtDate = (s) => {
    if (!s) return '—';
    const d = new Date(s);
    if (isNaN(d)) return s;
    return d.toLocaleString();
  };
  const fmtRelDate = (s) => {
    if (!s) return '—';
    const ms = Date.now() - new Date(s).getTime();
    const min = Math.floor(ms / 60000);
    if (min < 1) return 'just now';
    if (min < 60) return `${min}m ago`;
    const hr = Math.floor(min / 60);
    if (hr < 24) return `${hr}h ago`;
    const d = Math.floor(hr / 24);
    return `${d}d ago`;
  };

  async function adminFetch(path, opts = {}) {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) throw new Error('Not authenticated');
    const headers = {
      Authorization: `Bearer ${session.access_token}`,
      ...(opts.body ? { 'Content-Type': 'application/json' } : {}),
    };
    const res = await fetch(`${BACKEND_URL}/api/admin${path}`, {
      method: opts.method ?? 'GET',
      headers,
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
    if (res.status === 403) throw new Error('Your account is not in the admin allowlist.');
    if (!res.ok) {
      const body = await res.text();
      throw new Error(`${res.status}: ${body.slice(0, 300)}`);
    }
    return res.json();
  }

  // ── login ─────────────────────────────────────────────────────────────────
  function renderLogin(error = '') {
    app.innerHTML = '';
    const wrap = h('div', { class: 'login-wrap' });
    const errEl = h('div', { class: 'login-error' }, error);
    const emailIn = h('input', { type: 'email', autocomplete: 'email', required: 'true' });
    const pwIn = h('input', { type: 'password', autocomplete: 'current-password', required: 'true' });
    const btn = h('button', { type: 'submit' }, 'Sign in');

    const form = h('form', {
      onsubmit: async (e) => {
        e.preventDefault();
        btn.disabled = true;
        errEl.textContent = '';
        const { error } = await supabase.auth.signInWithPassword({
          email: emailIn.value.trim(),
          password: pwIn.value,
        });
        btn.disabled = false;
        if (error) {
          errEl.textContent = error.message;
          return;
        }
        boot();
      },
    },
      h('h2', {}, 'BookHoard Admin'),
      h('p', {}, 'Sign in with your admin account.'),
      h('label', {}, 'Email'),
      emailIn,
      h('label', {}, 'Password'),
      pwIn,
      btn,
      errEl,
    );
    wrap.append(form);
    app.append(wrap);
    setTimeout(() => emailIn.focus(), 50);
  }

  // ── shell ─────────────────────────────────────────────────────────────────
  const SECTIONS = [
    { id: 'users',          label: 'Users',           render: renderUsers },
    { id: 'financial',      label: 'Financial',       render: renderFinancial },
    { id: 'infrastructure', label: 'Infrastructure',  render: renderInfra },
    { id: 'jobs',           label: 'Jobs',            render: renderJobs },
    { id: 'errors',         label: 'Errors',          render: renderErrors },
    { id: 'analytics',      label: 'Analytics',       render: renderAnalytics },
  ];

  function renderShell(email) {
    app.innerHTML = '';
    const header = h('header', {},
      h('h1', {}, 'BookHoard Admin'),
      h('div', { class: 'who' },
        h('span', {}, email),
        h('button', {
          onclick: async () => { await supabase.auth.signOut(); renderLogin(); },
        }, 'Sign out'),
      ),
    );
    const main = h('main', {});
    const tabs = h('div', { class: 'tabs' });
    const panels = {};

    for (const s of SECTIONS) {
      const btn = h('button', {
        onclick: () => activate(s.id),
        'data-tab': s.id,
      }, s.label);
      tabs.append(btn);
      const panel = h('div', { class: 'panel', 'data-panel': s.id });
      panels[s.id] = panel;
      main.append(panel);
    }

    main.prepend(tabs);
    app.append(header, main);

    const loaded = new Set();
    function activate(id) {
      for (const b of tabs.querySelectorAll('button')) {
        b.classList.toggle('active', b.dataset.tab === id);
      }
      for (const p of main.querySelectorAll('.panel')) {
        p.classList.toggle('active', p.dataset.panel === id);
      }
      if (!loaded.has(id)) {
        loaded.add(id);
        const section = SECTIONS.find(s => s.id === id);
        section.render(panels[id]).catch(err => {
          panels[id].innerHTML = '';
          panels[id].append(h('div', { class: 'err' }, err.message));
        });
      }
      history.replaceState(null, '', `#${id}`);
    }

    const initial = location.hash.slice(1);
    activate(SECTIONS.find(s => s.id === initial) ? initial : SECTIONS[0].id);
  }

  // ── panels ────────────────────────────────────────────────────────────────
  async function renderUsers(panel) {
    panel.innerHTML = '';
    const search = h('input', { type: 'search', placeholder: 'Search by email…' });
    const goBtn = h('button', {}, 'Search');
    const row = h('div', { class: 'search-row' }, search, goBtn);
    const card = h('div', { class: 'card' });
    panel.append(row, card);

    async function load() {
      card.innerHTML = '';
      card.append(h('div', { class: 'loading' }, 'Loading users…'));
      const q = search.value.trim() ? `?search=${encodeURIComponent(search.value.trim())}` : '';
      const data = await adminFetch(`/users${q}`);
      card.innerHTML = '';
      const tbl = h('table', {});
      tbl.append(h('thead', {}, h('tr', {},
        h('th', {}, 'Email'),
        h('th', {}, 'Joined'),
        h('th', {}, 'Last seen'),
        h('th', {}, 'Books'),
        h('th', {}, 'Plan'),
        h('th', {}, 'Platform'),
        h('th', {}, 'Device'),
        h('th', {}, 'App ver'),
        h('th', {}, 'Sessions (30d)'),
        h('th', {}, 'Crashes (30d)'),
        h('th', {}, 'Actions'),
      )));
      const tbody = h('tbody');
      if (data.users.length === 0) {
        card.append(h('div', { class: 'empty' }, 'No users found.'));
        return;
      }
      for (const u of data.users) {
        const platformLabel = u.os
          ? `${u.os}${u.os_version ? ` ${u.os_version}` : ''}`
          : '—';
        const appVerLabel = u.app_version
          ? (u.app_build ? `${u.app_version} (${u.app_build})` : u.app_version)
          : '—';
        // Use last_seen (PostHog activity) over last_sign_in_at (Supabase auth)
        // because PostHog reflects actual app open / event activity, which is
        // closer to TestFlight's "last seen" semantics. Tooltip shows the
        // book count + top genres so we don't lose those columns entirely.
        const detailTip = `${fmtNum(u.book_count)} books · ${u.top_genres.join(', ') || 'no genres'}` +
          (u.last_book_added ? ` · last book ${fmtRelDate(u.last_book_added)}` : '');
        tbody.append(h('tr', {},
          h('td', { class: 'mono', title: u.id }, u.email ?? '—'),
          h('td', {}, fmtDate(u.created_at)),
          h('td', { title: detailTip }, fmtRelDate(u.last_seen_at ?? u.last_sign_in_at)),
          h('td', {}, fmtNum(u.book_count)),
          h('td', {}, planBadge(u)),
          h('td', {}, platformLabel),
          h('td', {}, u.device || '—'),
          h('td', { class: 'mono' }, appVerLabel),
          h('td', {}, fmtNum(u.sessions_30d ?? 0)),
          h('td', {
            title: u.crashes_30d == null
              ? 'Sentry not configured, or app does not call Sentry.setUser yet'
              : '',
          }, u.crashes_30d == null ? '—' : fmtNum(u.crashes_30d)),
          h('td', {}, userActions(u)),
        ));
      }
      tbl.append(tbody);
      card.append(h('h3', {}, `${data.users.length} users (page ${data.page})`), tbl);
    }
    goBtn.addEventListener('click', load);
    search.addEventListener('keydown', e => { if (e.key === 'Enter') load(); });
    await load();
  }

  async function renderFinancial(panel) {
    panel.innerHTML = '';
    panel.append(h('div', { class: 'loading' }, 'Loading financial data…'));
    const data = await adminFetch('/financial');
    panel.innerHTML = '';
    if (data.status === 'not_configured') {
      panel.append(notConfiguredCard('RevenueCat', data.reason));
      return;
    }
    if (data.status === 'error') {
      panel.append(h('div', { class: 'card' }, h('h3', {}, 'RevenueCat'), h('div', { class: 'err' }, data.reason)));
      return;
    }
    panel.append(
      h('div', { class: 'card' },
        h('h3', {}, 'Subscriptions'),
        h('div', { class: 'stat-grid' },
          stat('Active Hoard+', fmtNum(data.activeHoardPlus)),
          stat('Any active', fmtNum(data.anyActiveSubscribers)),
          stat('Lifetime grants', fmtNum(data.lifetimeGrants)),
          stat('Total customers', fmtNum(data.totalCustomers)),
          stat('Est. MRR', data.estimatedMrrUsd != null ? `$${data.estimatedMrrUsd.toFixed(2)}` : '—',
            data.avgPriceUsd ? `× $${data.avgPriceUsd}` : 'set REVENUECAT_AVG_PRICE_USD'),
        ),
        h('p', { class: 'empty' }, data.mrrNote),
        data.truncated ? h('p', { class: 'err' }, `Truncated at ${data.pagesScanned} pages — increase MAX_PAGES if needed.`) : null,
        h('p', {}, h('a', { href: data.dashboardUrl, target: '_blank' }, 'Open RevenueCat dashboard for MRR / churn →')),
      ),
    );
  }

  async function renderInfra(panel) {
    panel.innerHTML = '';
    panel.append(h('div', { class: 'loading' }, 'Loading infrastructure stats…'));
    const data = await adminFetch('/infrastructure');
    panel.innerHTML = '';

    // Supabase
    const sb = data.supabase;
    const sbCard = h('div', { class: 'card' }, h('h3', {}, 'Supabase'));
    sbCard.append(h('div', { class: 'stat-grid' },
      stat('DB size', sb.dbSizeBytes != null ? fmtBytes(sb.dbSizeBytes) : 'create RPC'),
      ...Object.entries(sb.tableCounts).map(([t, n]) =>
        stat(t, n != null ? fmtNum(n) : '—')),
    ));
    if (sb.dbSizeBytes == null) {
      sbCard.append(h('p', { class: 'empty' },
        'DB size requires a Postgres function. Run in Supabase SQL Editor: ',
        h('code', { class: 'mono' }, "create function admin_db_size() returns bigint language sql security definer as $$ select pg_database_size(current_database()); $$;"),
      ));
    }
    panel.append(sbCard);

    // Bandwidth — platform limit, link to dashboard
    const bw = sb.bandwidth;
    panel.append(h('div', { class: 'card' },
      h('h3', {}, 'Bandwidth / egress'),
      h('p', {}, h('span', { class: 'badge badge-muted' }, 'platform limit')),
      h('p', { class: 'empty' }, bw.reason),
      h('p', {}, h('a', { href: bw.dashboardUrl, target: '_blank' }, 'Open in Supabase dashboard →')),
    ));

    // Edge functions
    const ef = sb.edgeFunctions;
    const efCard = h('div', { class: 'card' }, h('h3', {}, 'Edge functions'));
    if (ef.status === 'ok') {
      efCard.append(h('div', { class: 'stat-grid' }, stat('Functions', fmtNum(ef.count))));
      if (ef.functions?.length) {
        const tbl = h('table', {});
        tbl.append(h('thead', {}, h('tr', {},
          h('th', {}, 'Slug'),
          h('th', {}, 'Name'),
          h('th', {}, 'Status'),
          h('th', {}, 'Updated'),
        )));
        const tbody = h('tbody');
        for (const fn of ef.functions) {
          tbody.append(h('tr', {},
            h('td', { class: 'mono' }, fn.slug),
            h('td', {}, fn.name),
            h('td', {}, fn.status),
            h('td', {}, fmtRelDate(fn.updatedAt)),
          ));
        }
        tbl.append(tbody);
        efCard.append(tbl);
      }
      efCard.append(h('p', { class: 'empty' }, ef.invocationsNote, ' '),
        h('p', {}, h('a', { href: ef.dashboardUrl, target: '_blank' }, 'Open functions dashboard →')));
    } else if (ef.status === 'not_configured') {
      efCard.append(h('p', {}, h('span', { class: 'badge badge-pending' }, 'not configured')), h('p', { class: 'empty' }, ef.reason));
    } else {
      efCard.append(h('div', { class: 'err' }, ef.reason ?? ef.status));
    }
    panel.append(efCard);

    // Anthropic
    const an = data.anthropic;
    const anCard = h('div', { class: 'card' }, h('h3', {}, 'Anthropic spend (this month)'));
    if (an.status === 'ok') {
      anCard.append(h('div', { class: 'stat-grid' },
        stat('Month-to-date', `$${an.monthToDateUsd.toFixed(2)}`),
        stat('Monthly cap', an.monthlyCapUsd != null ? `$${an.monthlyCapUsd.toFixed(2)}` : 'set ANTHROPIC_MONTHLY_CAP_USD'),
        stat('% of cap', an.pctOfCap != null ? fmtPct(an.pctOfCap) : '—'),
      ));
      if (an.dailySeries?.length) {
        const tbl = h('table', {});
        tbl.append(h('thead', {}, h('tr', {}, h('th', {}, 'Day'), h('th', {}, 'Spend (USD)'))));
        const tbody = h('tbody');
        for (const d of an.dailySeries) {
          tbody.append(h('tr', {}, h('td', {}, d.day), h('td', {}, `$${d.amount.toFixed(2)}`)));
        }
        tbl.append(tbody);
        anCard.append(tbl);
      }
    } else if (an.status === 'see_dashboard') {
      anCard.append(
        h('p', {}, h('span', { class: 'badge badge-muted' }, 'check console')),
        h('p', { class: 'empty' }, an.reason),
        h('p', {}, h('a', { href: an.dashboardUrl, target: '_blank' }, 'View Anthropic billing →')),
      );
    } else if (an.status === 'not_configured') {
      anCard.append(h('p', {}, h('span', { class: 'badge badge-pending' }, 'not configured')), h('p', { class: 'empty' }, an.reason));
    } else {
      anCard.append(h('div', { class: 'err' }, an.reason ?? an.status));
    }
    panel.append(anCard);

    // Gemini (shelf-scan vision provider)
    const gem = data.gemini;
    const gemCard = h('div', { class: 'card' }, h('h3', {}, 'Google Gemini — shelf scan'));
    if (gem.status === 'ok') {
      // Model availability badge — green if model is in Google's models list,
      // red if missing (deprecation/retirement signal). Same logic as the
      // gemini-model-check.yml GitHub Actions workflow.
      let availabilityBadge;
      if (gem.modelAvailable === true) {
        availabilityBadge = h('span', { class: 'badge badge-success' }, 'available');
      } else if (gem.modelAvailable === false) {
        availabilityBadge = h('span', { class: 'badge badge-fail' }, 'NOT in models API — deprecated?');
      } else {
        availabilityBadge = h('span', { class: 'badge badge-muted' }, gem.modelsApiError ? 'check failed' : 'unknown');
      }

      gemCard.append(h('p', {},
        h('strong', {}, 'Model: '), h('code', { class: 'mono' }, gem.model), ' ', availabilityBadge,
      ));

      gemCard.append(h('div', { class: 'stat-grid' },
        stat('Scans this month', gem.scanCount != null ? fmtNum(gem.scanCount) : '—'),
        stat('Per-scan estimate', `$${gem.perScanUsdEstimate.toFixed(4)}`),
        stat('Estimated spend', gem.estimatedSpendUsd != null ? `$${gem.estimatedSpendUsd.toFixed(2)}` : '—'),
      ));

      gemCard.append(h('p', { class: 'empty' }, gem.note));

      // Deprecation monitor — gemini-model-check.yml run health
      const wf = gem.workflow;
      if (wf) {
        let wfBadge, wfSub;
        if (wf.status === 'ok') {
          if (wf.lastRunConclusion === 'failure') {
            // Highest-priority signal: workflow failed (model probably deprecated).
            wfBadge = h('span', { class: 'badge badge-fail' }, 'FAILED — model may be deprecated');
            wfSub = h('a', { href: wf.lastRunUrl, target: '_blank' }, `run #${wf.runNumber} · ${fmtRelDate(wf.lastRunAt)} →`);
          } else if (wf.stale) {
            // Cron not firing — the monitor itself isn't healthy.
            wfBadge = h('span', { class: 'badge badge-pending' }, `stale — last ran ${wf.ageDays}d ago`);
            wfSub = h('a', { href: wf.lastRunUrl, target: '_blank' }, `run #${wf.runNumber} →`);
          } else if (wf.lastRunStatus === 'in_progress' || wf.lastRunStatus === 'queued') {
            wfBadge = h('span', { class: 'badge badge-muted' }, `${wf.lastRunStatus}…`);
            wfSub = h('a', { href: wf.lastRunUrl, target: '_blank' }, `run #${wf.runNumber} →`);
          } else if (wf.lastRunConclusion === 'success') {
            wfBadge = h('span', { class: 'badge badge-success' }, 'passing');
            wfSub = h('a', { href: wf.lastRunUrl, target: '_blank' }, `run #${wf.runNumber} · ${fmtRelDate(wf.lastRunAt)} →`);
          } else {
            wfBadge = h('span', { class: 'badge badge-muted' }, `${wf.lastRunConclusion ?? wf.lastRunStatus}`);
            wfSub = h('a', { href: wf.lastRunUrl, target: '_blank' }, `run #${wf.runNumber} →`);
          }
        } else if (wf.status === 'never_run') {
          wfBadge = h('span', { class: 'badge badge-pending' }, 'never run');
          wfSub = wf.reason;
        } else if (wf.status === 'not_configured') {
          wfBadge = h('span', { class: 'badge badge-muted' }, 'GITHUB_TOKEN not set');
          wfSub = wf.reason;
        } else {
          wfBadge = h('span', { class: 'badge badge-fail' }, 'check failed');
          wfSub = wf.reason;
        }
        gemCard.append(h('div', { class: 'stat-grid', style: 'margin-top: 0.75rem;' },
          stat('Deprecation monitor', wfBadge, wfSub),
        ));
      }

      gemCard.append(h('p', {},
        h('a', { href: gem.dashboardUrl, target: '_blank' }, 'AI Studio usage →'),
        ' · ',
        h('a', { href: gem.billingUrl, target: '_blank' }, 'Cloud billing →'),
      ));
      if (gem.modelsApiError) {
        gemCard.append(h('p', { class: 'empty' }, h('strong', {}, 'Models API error: '), gem.modelsApiError));
      }
    } else if (gem.status === 'not_configured') {
      gemCard.append(
        h('p', {}, h('span', { class: 'badge badge-pending' }, 'not configured')),
        h('p', { class: 'empty' }, gem.reason),
        h('p', {}, h('a', { href: gem.dashboardUrl, target: '_blank' }, 'AI Studio usage →')),
      );
    } else {
      gemCard.append(h('div', { class: 'err' }, gem.reason ?? gem.status));
    }
    panel.append(gemCard);

    // ISBNdb
    const isb = data.isbndb;
    panel.append(h('div', { class: 'card' },
      h('h3', {}, 'ISBNdb'),
      h('div', { class: 'stat-grid' },
        stat('Plan', isb.plan ?? '—'),
        stat('Daily limit', fmtNum(isb.dailyLimit)),
      ),
      h('p', { class: 'empty' }, isb.reason),
    ));

    // R2 backups
    const r2 = data.r2;
    const r2Card = h('div', { class: 'card' }, h('h3', {}, 'Cloudflare R2 backups'));
    if (r2.status === 'ok') {
      r2Card.append(h('div', { class: 'stat-grid' },
        stat('Bucket', r2.bucket),
        stat('Backups', fmtNum(r2.backupCount)),
        stat('Total size', fmtBytes(r2.totalSizeBytes)),
        stat('Last backup', fmtRelDate(r2.lastBackupAt)),
        stat('Last size', r2.lastBackupSizeBytes != null ? fmtBytes(r2.lastBackupSizeBytes) : '—'),
      ));
      if (r2.recent?.length) {
        const tbl = h('table', {});
        tbl.append(h('thead', {}, h('tr', {},
          h('th', {}, 'Key'),
          h('th', {}, 'Size'),
          h('th', {}, 'Modified'),
        )));
        const tbody = h('tbody');
        for (const o of r2.recent) {
          tbody.append(h('tr', {},
            h('td', { class: 'mono' }, o.key),
            h('td', {}, fmtBytes(o.sizeBytes)),
            h('td', {}, fmtRelDate(o.lastModified)),
          ));
        }
        tbl.append(tbody);
        r2Card.append(tbl);
      }
    } else if (r2.status === 'not_configured') {
      r2Card.append(h('p', {}, h('span', { class: 'badge badge-pending' }, 'not configured')), h('p', { class: 'empty' }, r2.reason));
    } else {
      r2Card.append(h('div', { class: 'err' }, r2.reason ?? r2.status));
    }
    panel.append(r2Card);
  }

  async function renderJobs(panel) {
    panel.innerHTML = '';
    panel.append(h('div', { class: 'loading' }, 'Loading job status…'));
    const data = await adminFetch('/jobs');
    panel.innerHTML = '';

    const gh = data.github;
    if (gh.status === 'not_configured') {
      panel.append(notConfiguredCard('GitHub Actions', gh.reason));
    } else {
      for (const r of gh.repos) {
        const card = h('div', { class: 'card' }, h('h3', {}, r.repo));
        if (r.error) {
          card.append(h('div', { class: 'err' }, r.error));
        } else if (!r.runs.length) {
          card.append(h('div', { class: 'empty' }, 'No active workflows.'));
        } else {
          const tbl = h('table', {});
          tbl.append(h('thead', {}, h('tr', {},
            h('th', {}, 'Workflow'),
            h('th', {}, 'Status'),
            h('th', {}, 'Run'),
            h('th', {}, 'Started'),
            h('th', {}, 'Duration'),
          )));
          const tbody = h('tbody');
          for (const run of r.runs) {
            tbody.append(h('tr', {},
              h('td', {}, run.workflow),
              h('td', {}, jobBadge(run)),
              h('td', {}, run.runNumber ? h('a', { href: run.url, target: '_blank' }, `#${run.runNumber}`) : '—'),
              h('td', {}, run.startedAt ? fmtRelDate(run.startedAt) : '—'),
              h('td', {}, run.durationSec != null ? `${run.durationSec}s` : '—'),
            ));
          }
          tbl.append(tbody);
          card.append(tbl);
        }
        panel.append(card);
      }
    }

    // Supabase cron
    const sc = data.supabaseCron;
    const card = h('div', { class: 'card' }, h('h3', {}, 'Supabase scheduled functions'));
    if (sc.status === 'error') {
      card.append(h('div', { class: 'err' }, sc.reason));
    } else {
      const tbl = h('table', {});
      tbl.append(h('thead', {}, h('tr', {},
        h('th', {}, 'Job'),
        h('th', {}, 'Last seen update'),
        h('th', {}, 'Note'),
      )));
      const tbody = h('tbody');
      for (const j of sc.jobs) {
        tbody.append(h('tr', {},
          h('td', {}, j.name),
          h('td', {}, fmtRelDate(j.lastSeenUpdate)),
          h('td', { class: 'empty' }, j.note),
        ));
      }
      tbl.append(tbody);
      card.append(tbl);
    }
    panel.append(card);
  }

  async function renderErrors(panel) {
    panel.innerHTML = '';
    panel.append(h('div', { class: 'loading' }, 'Loading Sentry…'));
    const data = await adminFetch('/errors');
    panel.innerHTML = '';

    if (data.status === 'not_configured') {
      panel.append(notConfiguredCard('Sentry', data.reason));
      return;
    }
    if (data.status === 'error') {
      panel.append(h('div', { class: 'card' }, h('div', { class: 'err' }, data.reason)));
      return;
    }
    panel.append(
      h('div', { class: 'card' },
        h('h3', {}, 'Overview'),
        h('div', { class: 'stat-grid' },
          stat('Unresolved', data.unresolvedCount),
          stat('Events (30d)', fmtNum(data.totalLast30d)),
        ),
      ),
    );

    const tbl = h('table', {});
    tbl.append(h('thead', {}, h('tr', {},
      h('th', {}, 'Issue'),
      h('th', {}, 'Level'),
      h('th', {}, 'Events'),
      h('th', {}, 'Users'),
      h('th', {}, 'Last seen'),
    )));
    const tbody = h('tbody');
    if (data.issues.length === 0) {
      tbody.append(h('tr', {}, h('td', { colspan: 5, class: 'empty' }, 'No unresolved issues 🎉'.replace('🎉', ''))));
    }
    for (const i of data.issues) {
      tbody.append(h('tr', {},
        h('td', {},
          h('a', { href: i.url, target: '_blank' }, i.title),
          i.culprit ? h('div', { class: 'empty mono' }, i.culprit) : null,
        ),
        h('td', {}, h('span', { class: levelBadge(i.level) }, i.level)),
        h('td', {}, fmtNum(i.eventCount)),
        h('td', {}, fmtNum(i.usersAffected)),
        h('td', {}, fmtRelDate(i.lastSeen)),
      ));
    }
    tbl.append(tbody);
    panel.append(h('div', { class: 'card' }, h('h3', {}, 'Unresolved issues'), tbl));
  }

  async function renderAnalytics(panel) {
    panel.innerHTML = '';
    panel.append(h('div', { class: 'loading' }, 'Loading analytics…'));
    const data = await adminFetch('/analytics');
    panel.innerHTML = '';

    const ph = data.posthog;
    if (ph.status === 'not_configured') {
      panel.append(notConfiguredCard('PostHog', ph.reason));
    } else if (ph.status === 'error') {
      panel.append(h('div', { class: 'card' }, h('h3', {}, 'PostHog'), h('div', { class: 'err' }, ph.reason)));
    } else {
      panel.append(
        h('div', { class: 'card' },
          h('h3', {}, 'PostHog'),
          h('div', { class: 'stat-grid' },
            stat('DAU today', fmtNum(ph.dauToday)),
            stat('MAU', ph.mau != null ? fmtNum(ph.mau) : 'TODO'),
            stat('Signups (30d)', fmtNum(ph.onboarding.signupsLast30d)),
            stat('Onboarding done (30d)', fmtNum(ph.onboarding.completedLast30d)),
            stat('Completion rate', fmtPct(ph.onboarding.completionRate)),
          ),
          ph.mauNote ? h('p', { class: 'empty' }, ph.mauNote) : null,
        ),
      );

      // Platform breakdown — iOS vs Android, app versions, OS versions (last 30d)
      const platforms = ph.platforms;
      if (platforms) {
        const platformCard = h('div', { class: 'card' }, h('h3', {}, 'Platforms (last 30d)'));

        // OS breakdown — single stat-grid row of "iOS: 42 (60%)" etc.
        const totalOsUsers = (platforms.os ?? []).reduce((sum, r) => sum + (r.users ?? 0), 0);
        if (totalOsUsers > 0) {
          platformCard.append(
            h('div', { class: 'stat-grid' },
              ...platforms.os.map(r => stat(r.os || 'unknown',
                `${fmtNum(r.users)} (${fmtPct(r.users / totalOsUsers)})`)),
            ),
          );
        } else {
          platformCard.append(h('p', { class: 'empty' }, 'No platform events in last 30d.'));
        }

        // App version distribution
        if ((platforms.appVersions ?? []).length > 0) {
          const tbl = h('table', {});
          tbl.append(h('thead', {}, h('tr', {},
            h('th', {}, 'App version'), h('th', {}, 'Users'), h('th', {}, '% of users'),
          )));
          const tbody = h('tbody');
          const totalApp = platforms.appVersions.reduce((s, r) => s + (r.users ?? 0), 0) || 1;
          for (const r of platforms.appVersions) {
            tbody.append(h('tr', {},
              h('td', { class: 'mono' }, r.version || '—'),
              h('td', {}, fmtNum(r.users)),
              h('td', {}, fmtPct(r.users / totalApp)),
            ));
          }
          tbl.append(tbody);
          platformCard.append(h('h4', { style: 'margin-top: 1rem;' }, 'App version distribution'), tbl);
        }

        // OS version distribution — top 20
        if ((platforms.osVersions ?? []).length > 0) {
          const tbl = h('table', {});
          tbl.append(h('thead', {}, h('tr', {},
            h('th', {}, 'OS'), h('th', {}, 'Version'), h('th', {}, 'Users'),
          )));
          const tbody = h('tbody');
          for (const r of platforms.osVersions) {
            tbody.append(h('tr', {},
              h('td', {}, r.os || '—'),
              h('td', { class: 'mono' }, r.version || '—'),
              h('td', {}, fmtNum(r.users)),
            ));
          }
          tbl.append(tbody);
          platformCard.append(h('h4', { style: 'margin-top: 1rem;' }, 'OS version (top 20)'), tbl);
        }

        panel.append(platformCard);
      }
    }

    const rs = data.resend;
    if (rs.status === 'not_configured') {
      panel.append(notConfiguredCard('Resend', rs.reason));
    } else if (rs.status === 'error') {
      panel.append(h('div', { class: 'card' }, h('h3', {}, 'Resend'), h('div', { class: 'err' }, rs.reason)));
    } else {
      const counts = rs.eventCounts || {};
      panel.append(
        h('div', { class: 'card' },
          h('h3', {}, `Resend (last ${rs.sampleSize} emails)`),
          h('div', { class: 'stat-grid' },
            stat('Delivered', fmtNum(counts.delivered ?? 0)),
            stat('Bounced', fmtNum(counts.bounced ?? 0)),
            stat('Complained', fmtNum(counts.complained ?? 0)),
            stat('Delivery rate', fmtPct(rs.deliveredRate)),
            stat('Bounce rate', fmtPct(rs.bounceRate)),
          ),
        ),
      );
      if (rs.recent?.length) {
        const tbl = h('table', {});
        tbl.append(h('thead', {}, h('tr', {},
          h('th', {}, 'To'), h('th', {}, 'Subject'), h('th', {}, 'Event'), h('th', {}, 'When'),
        )));
        const tbody = h('tbody');
        for (const e of rs.recent) {
          tbody.append(h('tr', {},
            h('td', { class: 'mono' }, e.to.join(', ')),
            h('td', {}, e.subject),
            h('td', {}, e.lastEvent),
            h('td', {}, fmtRelDate(e.createdAt)),
          ));
        }
        tbl.append(tbody);
        panel.append(h('div', { class: 'card' }, h('h3', {}, 'Recent emails'), tbl));
      }
    }
  }

  function planBadge(user) {
    const s = user.subscription_status;
    if (s === 'hoard_plus') {
      const expires = user.subscription_expires_at
        ? `until ${new Date(user.subscription_expires_at).toLocaleDateString()}`
        : 'lifetime';
      return h('div', {},
        h('span', { class: 'badge badge-success' }, 'Hoard+'),
        h('div', { class: 'empty', style: 'font-size: 0.72rem; margin-top: 0.2rem;' }, expires),
      );
    }
    if (s === 'free') return h('span', { class: 'badge badge-muted' }, 'free');
    if (s === 'not_configured') return h('span', { class: 'empty' }, '—');
    return h('span', { class: 'badge badge-muted' }, 'unknown');
  }

  function userActions(user) {
    const status = h('div', { class: 'row-status' }, '');
    const setStatus = (msg, kind) => {
      status.textContent = msg;
      status.className = `row-status ${kind || ''}`;
    };

    const resetBtn = h('button', { class: 'row-btn', onclick: async () => {
      if (!confirm(`Send password reset email to ${user.email}?`)) return;
      resetBtn.disabled = true;
      setStatus('Sending…');
      try {
        const r = await adminFetch(`/users/${user.id}/reset-password`, { method: 'POST' });
        setStatus(`Sent to ${r.sentTo}`, 'ok');
      } catch (err) {
        setStatus(err.message, 'err');
      } finally {
        resetBtn.disabled = false;
      }
    }}, 'Reset password');

    const durationSel = h('select', { class: 'row-select' },
      h('option', { value: 'monthly' }, '1 month'),
      h('option', { value: 'three_month' }, '3 months'),
      h('option', { value: 'yearly' }, '1 year'),
      h('option', { value: 'lifetime' }, 'Lifetime'),
    );

    const grantBtn = h('button', { class: 'row-btn', onclick: async () => {
      const dur = durationSel.value;
      if (!confirm(`Grant Hoard+ (${durationSel.options[durationSel.selectedIndex].text}) to ${user.email}?`)) return;
      grantBtn.disabled = true;
      setStatus('Granting…');
      try {
        await adminFetch(`/users/${user.id}/grant-premium`, { method: 'POST', body: { duration: dur } });
        setStatus(`Granted ${dur}`, 'ok');
      } catch (err) {
        setStatus(err.message, 'err');
      } finally {
        grantBtn.disabled = false;
      }
    }}, 'Grant Hoard+');

    // Pair the duration dropdown with Grant Hoard+ so flex-wrap can't separate them.
    const grantPair = h('div', { class: 'grant-pair' }, durationSel, grantBtn);

    return h('div', { class: 'row-actions' }, resetBtn, grantPair, status);
  }

  // ── small helpers ─────────────────────────────────────────────────────────
  function stat(label, value, sub) {
    return h('div', { class: 'stat' },
      h('div', { class: 'label' }, label),
      h('div', { class: 'value' }, value ?? '—'),
      sub ? h('div', { class: 'sub' }, sub) : null,
    );
  }
  function notConfiguredCard(name, reason) {
    return h('div', { class: 'card' },
      h('h3', {}, name),
      h('p', {}, h('span', { class: 'badge badge-pending' }, 'not configured')),
      h('p', { class: 'empty' }, reason),
    );
  }
  function statusCard(name, payload) {
    if (payload.status === 'ok') {
      return h('div', { class: 'card' }, h('h3', {}, name), h('p', {}, 'OK'));
    }
    return h('div', { class: 'card' },
      h('h3', {}, name),
      h('p', {}, h('span', { class: 'badge badge-pending' }, payload.status?.replace(/_/g, ' ') ?? 'unknown')),
      payload.reason ? h('p', { class: 'empty' }, payload.reason) : null,
    );
  }
  function jobBadge(run) {
    if (run.status === 'in_progress' || run.status === 'queued') {
      return h('span', { class: 'badge badge-pending' }, run.status);
    }
    if (run.conclusion === 'success') return h('span', { class: 'badge badge-success' }, 'success');
    if (run.conclusion === 'failure' || run.conclusion === 'cancelled' || run.conclusion === 'timed_out') {
      return h('span', { class: 'badge badge-fail' }, run.conclusion);
    }
    return h('span', { class: 'badge badge-muted' }, run.conclusion ?? run.status);
  }
  function levelBadge(level) {
    if (level === 'fatal' || level === 'error') return 'badge badge-fail';
    if (level === 'warning') return 'badge badge-pending';
    return 'badge badge-muted';
  }

  // ── boot ──────────────────────────────────────────────────────────────────
  async function boot() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      renderLogin();
      return;
    }
    renderShell(session.user.email);
  }

  boot();
</script>

</body>
</html>
